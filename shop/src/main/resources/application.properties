server.port=8080

spring.datasource.url=jdbc:mysql://localhost:3306/shop
spring.datasource.username=root
spring.datasource.password=yaoge123456
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver

mybatis.type-aliases-package=com.chinahitech.shop.bean

logging.level.com.chinahitech.shop.mapper=debug

spring.redis.sentinel.master=mymaster
spring.redis.sentinel.nodes=127.0.0.1:26379,127.0.0.1:26380,127.0.0.1:26381
spring.redis.database=0
logging.level.org.springframework.data.redis=DEBUG
spring.redis.timeout=10000
spring.redis.lettuce.pool.max-active=10
spring.redis.lettuce.pool.max-idle=5
spring.redis.lettuce.pool.min-idle=2
spring.redis.lettuce.pool.max-wait=10000

canal.server.host=127.0.0.1
canal.server.port=11111
canal.destination=example
canal.username=canal
canal.password=yaoge123456
canal.listen.db=shop
canal.listen.tables=brand,category,user
redis.cache.prefix=shop:
redis.cache.expire.hours=24

logging.file.name=./logs/shop.log

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n
logging.level.root=INFO
logging.level.com.chinahitech.shop=INFO
 logging.level.com.chinahitech.shop.service=INFO
 logging.level.com.chinahitech.shop.controller=INFO
logging.level.org.springframework.jdbc=ERROR
logging.level.org.springframework.kafka=INFO
logging.level.org.elasticsearch.client=WARN
logging.level.org.apache.kafka=WARN

#Kafka
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.group-id=shop-es-sync-group
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.properties.spring.json.trusted.packages=com.chinahitech.shop.bean,com.chinahitech.shop.es


# Elasticsearch
spring.elasticsearch.uris=http://localhost:9200
spring.elasticsearch.connection-timeout=5s
spring.elasticsearch.socket-timeout=60s

#Topic
kafka.topic.brand=shop.db.brand
kafka.topic.category=shop.db.category
